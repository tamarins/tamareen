    <style>
        :root {
            --primary: #2980b9;

        body {
            font-family: 'Tajawal', sans-serif;

        }

        header {

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ex-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border-color: var(--primary);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .ex-title {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .ex-desc {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 8px;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #7f8c8d;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover { color: var(--primary); }
    </style>
</head>
