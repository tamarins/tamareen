<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercices de Français - 5ème/6ème</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f0f2f5; padding: 20px; text-align: center; }
        .quiz-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2980b9; }
        .question { margin: 20px 0; font-size: 1.2rem; }
        .options button { display: block; width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; background: #fff; }
        .options button:hover { background: #3498db; color: white; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.2rem; }
        .back-btn { margin-top: 30px; display: inline-block; text-decoration: none; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Exercices Interactifs</h1>
    <p>Niveau: 5ème et 6ème Année Primaire</p>
    <hr>

    <div id="quiz">
        <div class="question" id="questionText">1. Choisis la bonne forme : "Nous (manger) une pomme."</div>
        <div class="options">
            <button onclick="checkAnswer(false)">mange</button>
            <button onclick="checkAnswer(true)">mangeons</button>
            <button onclick="checkAnswer(false)">mangez</button>
        </div>
    </div>

    <div id="result"></div>

    <a href="index.html" class="back-btn">← العودة إلى الصفحة الرئيسية</a>
</div>

<script>
    function checkAnswer(isCorrect) {
        const resultDiv = document.getElementById('result');
        if (isCorrect) {
            resultDiv.innerHTML = "Bravo ! C'est la bonne réponse. ✅";
            resultDiv.style.color = "green";
        } else {
            resultDiv.innerHTML = "Désolé, essaie encore. ❌";
            resultDiv.style.color = "red";
        }
    }
</script>

</body>
</html>
